name: Update IPTV playlists

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check biweekly cadence
        id: cadence
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          anchor="2026-07-13"
          today="$(date -u +%F)"
          today_seconds="$(date -u -d "$today" +%s)"
          anchor_seconds="$(date -u -d "$anchor" +%s)"
          days_since_anchor=$(( (today_seconds - anchor_seconds) / 86400 ))

          if [ "$days_since_anchor" -ge 0 ] && [ $((days_since_anchor % 14)) -eq 0 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cadence.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.cadence.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        if: steps.cadence.outputs.run == 'true'
        run: python -m pip install requests

      - name: Generate playlists
        if: steps.cadence.outputs.run == 'true'
        run: python get_js_unicom_iptv.py

      - name: Commit and push changes
        if: steps.cadence.outputs.run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add iptv_js_full-latest.m3u iptv_js_kid-latest.m3u history/*.m3u

          if git diff --cached --quiet; then
            echo "No playlist changes to commit."
            exit 0
          fi

          git commit -m "Update IPTV playlists"
          git push
